name: Zenodo DOI Auto-Update

on:
  release:
    types: [published]

jobs:
  update-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Wait for Zenodo webhook
        run: |
          echo "Waiting 90s for Zenodo..."
          sleep 90

      - name: Fetch DOI from Zenodo (attempt 1)
        id: zn1
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          Q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('related_identifier:https://github.com/Secret-Uzbek/ust-mvp'))")
          RESP=$(curl -s -H "Authorization: Bearer $ZENODO_TOKEN" "https://zenodo.org/api/records?q=$Q&size=5&sort=mostrecent")
          DOI=$(echo "$RESP" | python3 -c "
import sys,json
d=json.load(sys.stdin)
hits=d.get('hits',{}).get('hits',[])
print(hits[0]['doi'] if hits and 'doi' in hits[0] else '')
" 2>/dev/null || echo "")
          echo "doi=$DOI" >> $GITHUB_OUTPUT

      - name: Fetch DOI from Zenodo (retry after 60s)
        id: zn2
        if: steps.zn1.outputs.doi == ''
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          echo "Retrying in 60s..."
          sleep 60
          Q=$(python3 -c "import urllib.parse; print(urllib.parse.quote('related_identifier:https://github.com/Secret-Uzbek/ust-mvp'))")
          RESP=$(curl -s -H "Authorization: Bearer $ZENODO_TOKEN" "https://zenodo.org/api/records?q=$Q&size=5&sort=mostrecent")
          DOI=$(echo "$RESP" | python3 -c "
import sys,json
d=json.load(sys.stdin)
hits=d.get('hits',{}).get('hits',[])
print(hits[0]['doi'] if hits and 'doi' in hits[0] else '')
" 2>/dev/null || echo "")
          echo "doi=$DOI" >> $GITHUB_OUTPUT

      - name: Resolve final DOI
        id: doi
        run: |
          D="${{ steps.zn1.outputs.doi }}"
          [ -z "$D" ] && D="${{ steps.zn2.outputs.doi }}"
          echo "doi=$D" >> $GITHUB_OUTPUT
          echo "Final DOI: $D"

      - name: Update CITATION.cff
        if: steps.doi.outputs.doi != ''
        run: |
          D="${{ steps.doi.outputs.doi }}"
          TAG="${{ github.event.release.tag_name }}"
          DATE=$(date +%Y-%m-%d)
          if [ -f CITATION.cff ]; then
            if grep -q "^# doi:" CITATION.cff; then
              sed -i "s|^# doi:.*|doi: \"$D\"|" CITATION.cff
            elif grep -q "^doi:" CITATION.cff; then
              sed -i "s|^doi:.*|doi: \"$D\"|" CITATION.cff
            else
              echo "doi: \"$D\"" >> CITATION.cff
            fi
            sed -i "s|^version:.*|version: \"$TAG\"|" CITATION.cff
            sed -i "s|^date-released:.*|date-released: \"$DATE\"|" CITATION.cff
          else
            cat > CITATION.cff <<CFFEOF
cff-version: 1.2.0
message: "If you use this software, please cite it."
type: software
title: "ust-mvp"
authors:
  - family-names: Abdukarimov
    given-names: Abdurashid
    orcid: "https://orcid.org/0009-0000-6394-4912"
    affiliation: "Fractal Metascience Foundation, Tashkent, Uzbekistan"
repository-code: "https://github.com/Secret-Uzbek/ust-mvp"
url: "https://fractal-metascience.org"
keywords:
  - fractal-metascience
  - fmp
  - uzbekistan
  - open-science
license: CC-BY-4.0
version: "$TAG"
date-released: "$DATE"
doi: "$D"
CFFEOF
          fi

      - name: Commit CITATION.cff
        if: steps.doi.outputs.doi != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || git commit -m "ci: Zenodo DOI ${{ steps.doi.outputs.doi }} @ ${{ github.event.release.tag_name }}"
          git push

      - name: Job summary
        run: |
          D="${{ steps.doi.outputs.doi }}"
          if [ -n "$D" ]; then echo "✅ DOI: https://doi.org/$D"
          else echo "⚠️  DOI not found — check https://zenodo.org/search?q=ust-mvp"; fi
