name: Figshare & OSF Sync

on:
  release:
    types: [published]

jobs:
  sync-figshare-osf:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for assets
        run: sleep 30

      - name: Upload to Figshare
        env:
          FIGSHARE_TOKEN: ${{ secrets.FIGSHARE_TOKEN }}
        run: |
          if [ -z "$FIGSHARE_TOKEN" ]; then
            echo "FIGSHARE_TOKEN not set, skipping"
            exit 0
          fi

          TITLE="ust-mvp - ${{ github.event.release.tag_name }}"
          DESC="${{ github.event.release.body }}"
          REPO_URL="https://github.com/Secret-Uzbek/ust-mvp"

          # Create article
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $FIGSHARE_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.figshare.com/v2/account/articles" \
            -d "{
              \"title\": \"$TITLE\",
              \"description\": \"$DESC\",
              \"tags\": [\"FMP\",\"fractal-metascience\",\"open-science\"],
              \"references\": [\"$REPO_URL\"],
              \"categories\": [77],
              \"license\": 1
            }")

          ARTICLE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('entity_id',''))" 2>/dev/null || echo "")

          if [ -n "$ARTICLE_ID" ]; then
            echo "Figshare article created: $ARTICLE_ID"
            # Publish it
            curl -s -X POST \
              -H "Authorization: token $FIGSHARE_TOKEN" \
              "https://api.figshare.com/v2/account/articles/$ARTICLE_ID/publish" \
              > /dev/null
            echo "Published to Figshare"
          else
            echo "Could not create Figshare article: $RESPONSE"
          fi

      - name: Register on OSF
        env:
          OSF_TOKEN: ${{ secrets.OSF_TOKEN }}
        run: |
          if [ -z "$OSF_TOKEN" ]; then
            echo "OSF_TOKEN not set, skipping"
            exit 0
          fi

          TITLE="ust-mvp - ${{ github.event.release.tag_name }}"
          REPO_URL="https://github.com/Secret-Uzbek/ust-mvp"

          # Create OSF project node
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $OSF_TOKEN" \
            -H "Content-Type: application/vnd.api+json" \
            "https://api.osf.io/v2/nodes/" \
            -d "{
              \"data\": {
                \"type\": \"nodes\",
                \"attributes\": {
                  \"title\": \"$TITLE\",
                  \"category\": \"software\",
                  \"description\": \"Auto-synced from GitHub: $REPO_URL\",
                  \"public\": true
                }
              }
            }")

          NODE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('id',''))" 2>/dev/null || echo "")

          if [ -n "$NODE_ID" ]; then
            echo "OSF node created: https://osf.io/$NODE_ID"
          else
            echo "Could not create OSF node: $RESPONSE"
          fi
